<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>404 Page Not Found</title>
    <link rel="stylesheet" href="404.css" />
  </head>
  <body>
    <header class="error-nav">
      <a class="error-brand" href="../post/index.html">
        <span class="error-brand-icon" aria-hidden="true">🎣</span>
        <span>CatchLog</span>
      </a>
    </header>

    <main class="error-page">
      <section class="error-card">
        <div class="error-illustration" aria-hidden="true">
          <span class="water-line"></span>
          <span class="hook">〰️</span>
          <span class="fish">🐟</span>
        </div>

        <p class="error-label">404 Error</p>
        <h1>Looks like this catch swam away.</h1>

        <p class="error-message">
          The page you are looking for could not be found. It may have been
          moved, deleted, or the link may be incorrect.
        </p>

        <div class="error-actions">
          <a class="primary-btn" href="../main/index.html">Back to Feed</a>
          <button class="secondary-btn" type="button" id="go-back-btn">
            Go Back
          </button>
        </div>
      </section>
    </main>

    <script src="404.js"></script>
  </body>
</html>
