<!-- Inherit the shared layout from base.html -->
{% extends "base.html" %}

<!-- Set the browser tab title -->
{% block title %}Settings | CatchLog{% endblock %}

{% block styles %}
<link rel="stylesheet" href="{{ url_for('static', filename='css/settings.css') }}" />
{% endblock %}

{% block content %}
<!-- Toast notification: settings.js shows this when save/upload succeeds or fails -->
<div class="toast" id="toast" role="status" aria-live="polite"></div>

<div class="settings-container">
  <!-- Header -->
  <header class="settings-header">
    <a class="icon-button back-button" href="{{ url_for('profile.profile') }}" aria-label="Back to profile">
      <i class="fa-solid fa-arrow-left"></i>
    </a>
    <h1>Settings</h1>
    <div class="header-placeholder"></div>
  </header>

  <!-- Main Content -->
  <div class="settings-content">

    <!-- ── Profile Section ── -->
    <section class="settings-section">
      <h2 class="settings-section-title">Profile</h2>

      <!-- Avatar -->
      <!-- Clicking the avatar overlay opens the hidden file input -->
      <!-- settings.js uses FileReader to show a local preview, then uploads via FormData -->
      <div class="avatar-group">
        <div class="avatar-wrapper">
          <img
            src="{{ user.avatar_url or url_for('static', filename='img/default-avatar.png') }}"
            alt="Profile avatar"
            class="profile-pic"
            id="avatarPreview"
          />
          <label for="avatarUpload" class="avatar-edit-overlay" aria-label="Change Avatar">
            <i class="fa-solid fa-pen"></i>
          </label>
          <!-- Hidden file input: only accepts image types -->
          <input
            type="file"
            id="avatarUpload"
            accept="image/png, image/jpeg, image/jpg, image/webp"
            hidden
          />
        </div>
        <p class="avatar-hint">Click to update your photo</p>
      </div>

      <!-- Username -->
      <div class="form-group">
        <label for="username">Username</label>
        <input
          type="text"
          id="username"
          value="{{ user.username }}"
          placeholder="Enter your username"
          minlength="3"
          maxlength="50"
        />
      </div>

      <!-- Email (read-only) -->
      <!-- Email cannot be changed after registration -->
      <div class="form-group">
        <label for="email">Email</label>
        <input
          type="email"
          id="email"
          value="{{ user.email }}"
          readonly
        />
        <span class="field-hint">Email cannot be changed.</span>
      </div>

      <!-- Bio -->
      <div class="form-group">
        <label for="bio">Bio</label>
        <textarea
          id="bio"
          rows="4"
          maxlength="500"
          placeholder="Tell others about yourself..."
        >{{ user.bio or '' }}</textarea>
      </div>

      <button type="button" class="save-btn" id="saveProfileBtn">Save Changes</button>
    </section>

    <div class="section-divider"></div>

    <!-- ── Security Section ── -->
    <section class="settings-section">
      <h2 class="settings-section-title">Security</h2>

      <div class="form-group">
        <label for="currentPassword">Current Password</label>
        <input type="password" id="currentPassword" placeholder="Enter current password" />
      </div>

      <div class="form-group">
        <label for="newPassword">New Password</label>
        <input type="password" id="newPassword" placeholder="At least 6 characters" minlength="6" />
      </div>

      <div class="form-group">
        <label for="confirmPassword">Confirm New Password</label>
        <input type="password" id="confirmPassword" placeholder="Repeat new password" />
      </div>

      <button type="button" class="change-password-btn" id="changePasswordBtn">Change Password</button>
    </section>

    <div class="section-divider"></div>

    <!-- ── Danger Zone ── -->
    <div class="danger-zone">
      <button type="button" class="logout-btn" id="logoutBtn">
        <i class="fa-solid fa-arrow-right-from-bracket"></i>
        Log Out
      </button>
    </div>

  </div>
</div>
{% endblock %}

{% block scripts %}
<script src="{{ url_for('static', filename='js/settings.js') }}"></script>
{% endblock %}
