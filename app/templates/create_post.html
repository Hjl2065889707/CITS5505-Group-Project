{% extends "base.html" %}

{% block title %}Create Post | CatchLog{% endblock %}

{% block styles %}
<link rel="stylesheet" href="{{ url_for('static', filename='css/create-post.css') }}" />
{% endblock %}

{% block content %}
<div class="create-container">
  <button onclick="location.href = '{{ url_for('feed') }}'" class="back-btn">
    ← Back
  </button>

  <h2>Create a New Post</h2>

  <div class="form-field">
    <label for="postText">Post</label>
    <textarea
      id="postText"
      class="post-text"
      placeholder="Share your fishing experience or tips..."
    ></textarea>
  </div>

  <div class="form-field upload-field">
    <label for="imageInput">Upload Images</label>
    <input type="file" id="imageInput" multiple />
  </div>

  <div class="image-preview" id="imagePreview">
    <div class="preview-box">Preview</div>
  </div>

  <div class="form-field">
    <label for="postLocation">Location</label>
    <input
      type="text"
      id="postLocation"
      class="location-input"
      placeholder="Add location..."
    />
  </div>

  <div class="form-field">
    <label for="postCategory">Category</label>
    <select id="postCategory" class="category-select">
      <option disabled selected>Select Category</option>
      <option>Bass</option>
      <option>Trout</option>
      <option>Gear</option>
      <option>Question</option>
    </select>
  </div>

  <button class="post-btn">Post</button>
</div>
{% endblock %}

{% block scripts %}
<script src="{{ url_for('static', filename='js/create-post.js') }}"></script>
{% endblock %}
