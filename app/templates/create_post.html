{% extends "base.html" %}

{% block title %}Create Post | CatchLog{% endblock %}

{% block styles %}
<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
<link rel="stylesheet" href="{{ url_for('static', filename='css/create-post.css') }}" />
{% endblock %}

{% block content %}
<div class="create-container">
  <button onclick="location.href = '{{ url_for('feed') }}'" class="back-btn">
    ← Back
  </button>

  <h2>Create a New Post</h2>

  <div class="form-field">
    <label for="postText">Post <span class="field-required">Required</span></label>
    <textarea
      id="postText"
      class="post-text"
      placeholder="Share your fishing experience or tips..."
      required
    ></textarea>
  </div>

  <div class="form-field upload-field">
    <label for="imageInput">Upload Images <span class="field-optional">Optional</span></label>
    <input type="file" id="imageInput" multiple />
  </div>

  <div class="image-preview" id="imagePreview">
    <div class="preview-box">Preview</div>
  </div>

  <div class="form-field">
    <label for="postLocation">Location <span class="field-optional">Optional</span></label>
    <input
      type="text"
      id="postLocation"
      class="location-input"
      placeholder="Add location..."
    />
  </div>

  <div class="form-field">
    <label>Map Point <span class="field-optional">Optional</span></label>
    <div id="locationMap" class="location-map"></div>
    <p id="selectedCoordinates" class="selected-coordinates">
      No map point selected.
    </p>
  </div>

  <div class="form-field">
    <label for="postCategory">Category <span class="field-required">Required</span></label>
    <select id="postCategory" class="category-select" required>
      <option value="" disabled selected>Select Category</option>
      <option>Catch Report</option>
      <option>Gear Review</option>
      <option>Question</option>
      <option>General</option>
    </select>
  </div>

  <details class="catch-details">
    <summary>Catch Details</summary>

    <div class="catch-details__fields">
      <div class="form-field">
        <label for="postSpecies">Species <span class="field-optional">Optional</span></label>
        <input
          type="text"
          id="postSpecies"
          class="text-input"
          placeholder="e.g. Largemouth Bass"
        />
      </div>

      <div class="form-field">
        <label for="postWeight">Weight (kg) <span class="field-optional">Optional</span></label>
        <input
          type="number"
          id="postWeight"
          class="text-input"
          min="0"
          step="0.01"
          placeholder="e.g. 2.04"
        />
      </div>

      <div class="form-field">
        <label for="postBait">Bait <span class="field-optional">Optional</span></label>
        <input
          type="text"
          id="postBait"
          class="text-input"
          placeholder="e.g. Plastic Worm"
        />
      </div>
    </div>
  </details>

  <button class="post-btn" data-feed-url="{{ url_for('feed') }}">Post</button>
</div>
{% endblock %}

{% block scripts %}
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
<script src="{{ url_for('static', filename='js/create-post.js') }}"></script>
{% endblock %}
